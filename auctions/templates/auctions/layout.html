{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tahani For Art</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-red: #a42424; 
            --bg-cream: #ffffff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-cream); 
            color: #1a1a1a;
            margin: 0;
        }
        .navbar {
            background-color: var(--brand-red) !important;
            padding: 15px 0;
            border: none;
        }
        .navbar-brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: white !important;
            letter-spacing: 1px;
        }
        .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 400;
        }
        .btn-gallery {
            background: white;
            color: var(--brand-red) !important;
            border-radius: 50px;
            padding: 8px 24px;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-gallery:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">Tahani For Art</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link px-3" href="{% url 'index' %}">Home</a>
                <a class="nav-link px-3" href="{% url 'categories' %}">Artists</a>
                {% if user.is_authenticated %}
                    <a class="nav-link px-3" href="{% url 'watchlist' %}">Watchlist</a>
                    <a href="{% url 'logout' %}" class="btn-gallery ms-3">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn-gallery ms-3">Join Gallery</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        {% block body %}{% endblock %}
    </div>
</body>
</html>
